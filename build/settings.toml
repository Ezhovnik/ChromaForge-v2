[display]
width = 1280
height = 734
samples = 0
swap-interval = 1
fullscreen = true

[chunks]
load-distance = 22
load-speed = 4
padding = 2

[camera]
fov-events = true
shaking = true
fov = 90
sensitivity = 2

[graphics]
fog-curve = 1.6
backlight = true
frustum-culling = true
skybox-resolution = 96
gamma = 1

[debug]
generator-test-mode = false
do-write-lights = true

[ui]
language = "ru_RU"

